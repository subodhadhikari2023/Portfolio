name: Sync Portfolio Projects

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  # Also lets you trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-portfolio.mjs

      - name: Check if portfolio.json changed
        id: diff
        run: |
          git diff --quiet src/data/portfolio.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "portfolio-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/portfolio.json
          git commit -m "feat(portfolio): auto-add repos tagged portfolio-featured"
          git push origin HEAD:main
