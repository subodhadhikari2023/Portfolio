name: Sync Portfolio Projects

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  # Also lets you trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-portfolio.mjs

      - name: Check if portfolio.json changed
        id: diff
        run: |
          git diff --quiet src/data/portfolio.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open draft PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat(portfolio): add draft entries for new portfolio-featured repos'
          branch: auto/portfolio-sync
          delete-branch: true
          title: '📦 New repos detected — fill in portfolio details'
          body: |
            This PR was opened automatically by the Portfolio Sync workflow.

            ## Before merging

            Open `src/data/portfolio.json` and for every entry with `"_draft": true`:

            1. **`customTitle`** — your display name for the project
            2. **`customDescription`** — 1–2 sentences, outcome-first (what it does and why it matters)
            3. **`highlight`** — one punchy line: key stat, client, or deployment fact
            4. **`tags`** — exact tech used (check the auto-filled list and correct it)
            5. **`liveUrl`** — deployed URL, or `null` if not public
            6. **Delete `"_draft": true`** — draft entries are hidden on the live site

            Once you merge, Vercel deploys within 60 seconds.

            ---
            *Auto-generated by [sync-portfolio.yml](.github/workflows/sync-portfolio.yml)*
          labels: 'portfolio,automated'
