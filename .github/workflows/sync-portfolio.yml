name: Sync Portfolio Projects

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  # Also lets you trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-portfolio.mjs

      - name: Check if portfolio.json changed
        id: diff
        run: |
          git diff --quiet src/data/portfolio.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open draft PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat(portfolio): add draft entries for new portfolio-featured repos'
          branch: auto/portfolio-sync
          delete-branch: true
          title: '📦 New repos detected — fill in portfolio details'
          body: |
            This PR was opened automatically by the Portfolio Sync workflow.

            Fields were **pre-filled from the repository README**. Review each `"_draft": true` entry in `src/data/portfolio.json` and check:

            1. **`customTitle`** — parsed from the README H1 heading
            2. **`customDescription`** — parsed from the first README paragraph
            3. **`highlight`** — parsed from test counts or deployment mentions (often needs a manual touch)
            4. **`tags`** — parsed from the README Tech Stack section + repo topics
            5. **`liveUrl`** — parsed from README demo links or repo homepage
            6. **Delete `"_draft": true`** — draft entries are hidden on the live site until removed

            If a repo had no README, one was created automatically — push any updates to it before merging.

            Once you merge, Vercel deploys within 60 seconds.

            ---
            *Auto-generated by [sync-portfolio.yml](.github/workflows/sync-portfolio.yml)*
          labels: 'portfolio,automated'
